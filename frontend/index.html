<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AlcooTracker 🍺</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f4f6fb;
      --card:    #ffffff;
      --border:  #e2e8f0;
      --text:    #1a202c;
      --sub:     #64748b;
      --muted:   #cbd5e1;
      --shadow:  0 2px 16px #0000000d;
      --c0: #22c55e;
      --c1: #84cc16;
      --c2: #eab308;
      --c3: #f97316;
      --c4: #ef4444;
      --c5: #a855f7;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 36px 16px 80px;
    }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 40px; }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 900;
      letter-spacing: -1px;
      color: #1a202c;
    }

    header h1 span {
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #status {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--sub);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    #dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .4s;
    }
    #dot.ok { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 18px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 22px 18px;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px #0000001a;
    }

    .card-stripe {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 18px 18px 0 0;
    }

    /* ── Name row ── */
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .card-emoji {
      font-size: 1.4rem;
    }

    /* ── Big BAC number ── */
    .bac-block {
      text-align: center;
      margin-bottom: 14px;
    }

    .bac-number {
      font-size: 3rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -2px;
    }

    .bac-unit {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--sub);
      margin-top: 2px;
    }

    .bac-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--sub);
      margin-top: 4px;
    }

    /* ── Progress bar ── */
    .bar-wrap {
      margin-bottom: 14px;
    }

    .bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.62rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .bar-bg {
      height: 8px;
      background: var(--border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }

    .bar-legal {
      position: absolute;
      top: 0; bottom: 0;
      left: 25%;
      width: 2px;
      background: #f97316;
    }

    /* ── Stats ── */
    .stats {
      display: flex;
      gap: 8px;
    }

    .stat {
      flex: 1;
      background: var(--bg);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
    }

    .stat-val {
      font-size: 1rem;
      font-weight: 700;
    }

    .stat-lbl {
      font-size: 0.62rem;
      color: var(--sub);
      margin-top: 1px;
    }

    .no-session { opacity: 0.5; }

    /* ── Empty ── */
    #empty {
      text-align: center;
      color: var(--sub);
      margin-top: 80px;
    }
    #empty .icon { font-size: 3.5rem; margin-bottom: 12px; }
    #empty p { font-size: 1rem; }
  </style>
</head>
<body>

<header>
  <h1>🍺 <span>AlcooTracker</span></h1>
  <div id="status">
    <div id="dot"></div>
    <span id="status-text">Connexion…</span>
  </div>
</header>

<div id="grid"></div>
<div id="empty" style="display:none">
  <div class="icon">🫗</div>
  <p>Aucune session active pour le moment.</p>
</div>

<script>
  const WS_URL = location.hostname === "localhost"
    ? "ws://localhost:8001/ws"
    : "wss://drunk-l34t.onrender.com/ws";

  const COLORS = ['#22c55e','#84cc16','#eab308','#f97316','#ef4444','#a855f7'];
  const EMOJIS = ['😶','🙂','😄','😵','🤢','💀'];
  const LABELS_SHORT = ['Sobre','Léger','Alcoolisé','⚠️ Limite','Ivre','Danger'];

  function level(bac) {
    if (bac === 0)  return 0;
    if (bac < 0.2) return 1;
    if (bac < 0.5) return 2;
    if (bac < 0.8) return 3;
    if (bac < 1.5) return 4;
    return 5;
  }

  function renderCard(u) {
    const lvl   = level(u.bac);
    const color = COLORS[lvl];
    const emoji = EMOJIS[lvl];
    const pct   = Math.min(100, (u.bac / 2.0) * 100).toFixed(1);

    return `
    <div class="card ${!u.has_session ? 'no-session' : ''}">
      <div class="card-stripe" style="background:${color}"></div>
      <div class="card-head">
        <div class="card-name">${esc(u.username)}</div>
        <div class="card-emoji">${emoji}</div>
      </div>

      <div class="bac-block">
        <div class="bac-number" style="color:${color}">${u.bac.toFixed(2)}</div>
        <div class="bac-unit">g/L de sang</div>
        <div class="bac-label">${LABELS_SHORT[lvl]}</div>
      </div>

      <div class="bar-wrap">
        <div class="bar-labels"><span>0</span><span style="color:#f97316">0.5 limite</span><span>2.0</span></div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
          <div class="bar-legal"></div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-val">${u.nb_drinks}</div>
          <div class="stat-lbl">verre(s)</div>
        </div>
        <div class="stat">
          <div class="stat-val">${u.sober_in_h}h</div>
          <div class="stat-lbl">sobre dans</div>
        </div>
      </div>
    </div>`;
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render(data) {
    const grid  = document.getElementById('grid');
    const empty = document.getElementById('empty');
    if (!data.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    grid.innerHTML = data.map(renderCard).join('');
  }

  let ws, retryDelay = 2000;

  function setStatus(ok, txt) {
    document.getElementById('dot').className = ok ? 'ok' : '';
    document.getElementById('status-text').textContent = txt;
  }

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onopen  = () => { setStatus(true, 'Connecté — temps réel'); retryDelay = 2000; };
    ws.onmessage = e => {
      render(JSON.parse(e.data));
      setStatus(true, 'Mis à jour à ' + new Date().toLocaleTimeString('fr-FR'));
    };
    ws.onclose = () => {
      setStatus(false, `Reconnexion dans ${retryDelay/1000}s…`);
      setTimeout(connect, retryDelay);
      retryDelay = Math.min(retryDelay * 2, 30000);
    };
    ws.onerror = () => ws.close();
  }

  connect();
</script>
</body>
</html>
