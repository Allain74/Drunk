<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AlcooTracker 🍺</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f4f6fb;
      --card:   #ffffff;
      --border: #e2e8f0;
      --text:   #1a202c;
      --sub:    #64748b;
      --muted:  #cbd5e1;
      --shadow: 0 2px 16px #0000000d;
    }

    [data-theme="dark"] {
      --bg:     #0e1117;
      --card:   #161b27;
      --border: #1e2640;
      --text:   #e8eaf6;
      --sub:    #7986cb;
      --muted:  #3a4060;
      --shadow: 0 2px 16px #00000033;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px 80px;
      transition: background .3s, color .3s;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      position: relative;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 900;
      letter-spacing: -1px;
    }

    h1 span {
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #theme-btn {
      position: absolute;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text);
      transition: background .2s;
    }

    #status {
      text-align: center;
      font-size: 0.78rem;
      color: var(--sub);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
    }

    #dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:background .4s; }
    #dot.ok { background:#22c55e; box-shadow:0 0 6px #22c55e88; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 8px;
      max-width: 1000px;
      margin: 0 auto 24px;
    }

    .tab {
      padding: 8px 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--sub);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .tab.active {
      background: #6366f1;
      color: #fff;
      border-color: #6366f1;
    }

    /* ── Panels ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }

    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px #0000001a; }
    .card-stripe { position:absolute; top:0; left:0; right:0; height:4px; border-radius:16px 16px 0 0; }

    .card-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .card-name { font-size:1rem; font-weight:700; }
    .card-emoji { font-size:1.3rem; }

    .bac-block { text-align:center; margin-bottom:12px; }
    .bac-number { font-size:2.6rem; font-weight:900; letter-spacing:-2px; line-height:1; }
    .bac-unit { font-size:0.7rem; color:var(--sub); margin-top:2px; }
    .bac-label { font-size:0.78rem; color:var(--sub); margin-top:4px; }

    .bar-wrap { margin-bottom:12px; }
    .bar-labels { display:flex; justify-content:space-between; font-size:0.6rem; color:var(--muted); margin-bottom:3px; }
    .bar-bg { height:7px; background:var(--border); border-radius:8px; overflow:hidden; position:relative; }
    .bar-fill { height:100%; border-radius:8px; transition:width 1s cubic-bezier(.4,0,.2,1); }
    .bar-legal { position:absolute; top:0; bottom:0; left:25%; width:2px; background:#f97316; }

    .stats { display:flex; gap:8px; }
    .stat { flex:1; background:var(--bg); border-radius:10px; padding:8px; text-align:center; }
    .stat-val { font-size:.95rem; font-weight:700; }
    .stat-lbl { font-size:0.6rem; color:var(--sub); margin-top:1px; }

    .no-session { opacity:0.45; }

    /* ── Graphique modal ── */
    .modal-bg {
      display:none;
      position:fixed; inset:0;
      background:#0007;
      z-index:100;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .modal-bg.open { display:flex; }

    .modal {
      background:var(--card);
      border-radius:20px;
      padding:24px;
      width:100%;
      max-width:560px;
      position:relative;
    }

    .modal h3 { font-size:1.1rem; font-weight:700; margin-bottom:16px; }
    .modal-close {
      position:absolute; top:16px; right:16px;
      background:none; border:none; font-size:1.4rem;
      cursor:pointer; color:var(--sub);
    }

    /* ── Défi ── */
    #defi-panel { max-width:1000px; margin:0 auto; }

    .podium {
      display:flex;
      gap:12px;
      justify-content:center;
      margin-bottom:24px;
      flex-wrap:wrap;
    }

    .podium-item {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px 24px;
      text-align:center;
      min-width:140px;
      box-shadow:var(--shadow);
    }

    .podium-medal { font-size:2rem; margin-bottom:4px; }
    .podium-name { font-weight:700; font-size:0.95rem; }
    .podium-bac { font-size:1.4rem; font-weight:900; margin-top:4px; }
    .podium-lbl { font-size:0.65rem; color:var(--sub); margin-top:2px; }

    .defi-table {
      width:100%;
      border-collapse:collapse;
      background:var(--card);
      border-radius:16px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .defi-table th {
      background:var(--border);
      padding:10px 16px;
      text-align:left;
      font-size:0.75rem;
      color:var(--sub);
      font-weight:600;
      text-transform:uppercase;
    }

    .defi-table td {
      padding:12px 16px;
      border-top:1px solid var(--border);
      font-size:0.9rem;
    }

    /* ── Map ── */
    #map-section { max-width:1000px; margin:24px auto 0; }
    #map-section h2 { font-size:.9rem; font-weight:700; color:var(--sub); margin-bottom:10px; text-transform:uppercase; }
    #map { height:300px; border-radius:16px; border:1px solid var(--border); overflow:hidden; }

    /* ── Empty ── */
    #empty { text-align:center; color:var(--sub); margin-top:80px; }
    #empty .icon { font-size:3rem; margin-bottom:10px; }
  </style>
</head>
<body>

<header>
  <h1>🍺 <span>AlcooTracker</span></h1>
  <button id="theme-btn" onclick="toggleTheme()">🌙</button>
</header>

<div id="status">
  <div id="dot"></div>
  <span id="status-text">Connexion…</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('live')">📊 Live</button>
  <button class="tab" onclick="showTab('defi')">🏆 Défi</button>
</div>

<!-- Live -->
<div id="live-panel" class="panel active">
  <div id="grid"></div>
  <div id="empty" style="display:none"><div class="icon">🫗</div><p>Aucune session active.</p></div>
  <div id="map-section" style="display:none">
    <h2>📍 Positions</h2>
    <div id="map"></div>
  </div>
</div>

<!-- Défi -->
<div id="defi-panel" class="panel">
  <div class="podium" id="podium"></div>
  <table class="defi-table">
    <thead><tr><th>#</th><th>Joueur</th><th>TAC</th><th>Verres</th><th>Sobre dans</th></tr></thead>
    <tbody id="defi-tbody"></tbody>
  </table>
</div>

<!-- Modal graphique -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modal-title">Évolution du TAC</h3>
    <canvas id="chart" height="200"></canvas>
  </div>
</div>

<script>
  const API = location.hostname === "localhost"
    ? "http://localhost:8001"
    : "https://drunk-l34t.onrender.com";
  const WS_URL = API.replace("http", "ws").replace("https", "wss") + "/ws";

  const COLORS  = ['#22c55e','#84cc16','#eab308','#f97316','#ef4444','#a855f7'];
  const EMOJIS  = ['😶','🙂','😄','😵','🤢','💀'];
  const LABELS  = ['Sobre','Léger','Alcoolisé','⚠️ Limite','Ivre','Danger'];

  function level(bac) {
    if (bac===0) return 0; if (bac<0.2) return 1; if (bac<0.5) return 2;
    if (bac<0.8) return 3; if (bac<1.5) return 4; return 5;
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ── Thème ──
  function toggleTheme() {
    const html = document.documentElement;
    const dark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', dark ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = dark ? '🌙' : '☀️';
    localStorage.setItem('theme', dark ? 'light' : 'dark');
  }

  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
  }

  // ── Tabs ──
  function showTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['live','defi'][i]===name));
    document.getElementById('live-panel').classList.toggle('active', name==='live');
    document.getElementById('defi-panel').classList.toggle('active', name==='defi');
  }

  // ── Cards ──
  function renderCard(u) {
    const lvl = level(u.bac);
    const color = COLORS[lvl];
    const pct = Math.min(100,(u.bac/2)*100).toFixed(1);
    return `
    <div class="card ${!u.has_session?'no-session':''}" onclick="openChart('${esc(u.username)}')">
      <div class="card-stripe" style="background:${color}"></div>
      <div class="card-head">
        <div class="card-name">${esc(u.username)}</div>
        <div class="card-emoji">${EMOJIS[lvl]}</div>
      </div>
      <div class="bac-block">
        <div class="bac-number" style="color:${color}">${u.bac.toFixed(2)}</div>
        <div class="bac-unit">g/L de sang</div>
        <div class="bac-label">${LABELS[lvl]}</div>
      </div>
      <div class="bar-wrap">
        <div class="bar-labels"><span>0</span><span style="color:#f97316">0.5</span><span>2.0</span></div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
          <div class="bar-legal"></div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-val">${u.nb_drinks}</div><div class="stat-lbl">verre(s)</div></div>
        <div class="stat"><div class="stat-val">${u.sober_in_h}h</div><div class="stat-lbl">sobre dans</div></div>
      </div>
    </div>`;
  }

  // ── Défi ──
  function renderDefi(data) {
    const sorted = [...data].sort((a,b) => b.bac - a.bac);
    const medals = ['🥇','🥈','🥉'];
    const podium = document.getElementById('podium');
    const tbody  = document.getElementById('defi-tbody');

    podium.innerHTML = sorted.slice(0,3).map((u,i) => {
      const color = COLORS[level(u.bac)];
      return `<div class="podium-item">
        <div class="podium-medal">${medals[i]||''}</div>
        <div class="podium-name">${esc(u.username)}</div>
        <div class="podium-bac" style="color:${color}">${u.bac.toFixed(2)}</div>
        <div class="podium-lbl">g/L — ${LABELS[level(u.bac)]}</div>
      </div>`;
    }).join('');

    tbody.innerHTML = sorted.map((u,i) => {
      const color = COLORS[level(u.bac)];
      return `<tr>
        <td>${medals[i]||i+1}</td>
        <td><strong>${esc(u.username)}</strong></td>
        <td style="color:${color};font-weight:700">${u.bac.toFixed(2)} g/L</td>
        <td>${u.nb_drinks}</td>
        <td>${u.sober_in_h}h</td>
      </tr>`;
    }).join('');
  }

  // ── Carte ──
  let map = null, markers = {};

  function updateMap(data) {
    const withLoc = data.filter(u => u.lat && u.lon);
    const section = document.getElementById('map-section');
    if (!withLoc.length) { section.style.display='none'; return; }
    section.style.display = 'block';
    if (!map) {
      map = L.map('map').setView([46.8,2.3],5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(map);
    }
    withLoc.forEach(u => {
      const color = COLORS[level(u.bac)];
      const icon = L.divIcon({
        className:'',
        html:`<div style="background:${color};color:#fff;font-weight:700;font-size:11px;
              padding:4px 9px;border-radius:99px;white-space:nowrap;
              box-shadow:0 2px 8px #0004;border:2px solid #fff">
              ${esc(u.username)} ${u.bac.toFixed(2)}g/L</div>`,
        iconAnchor:[0,0]
      });
      if (markers[u.username]) markers[u.username].setLatLng([u.lat,u.lon]).setIcon(icon);
      else markers[u.username] = L.marker([u.lat,u.lon],{icon}).addTo(map);
    });
    map.fitBounds(L.latLngBounds(withLoc.map(u=>[u.lat,u.lon])),{padding:[40,40]});
  }

  // ── Graphique ──
  let chartInst = null;

  async function openChart(username) {
    document.getElementById('modal-title').textContent = `📈 ${username}`;
    document.getElementById('modal-bg').classList.add('open');

    const history = await fetch(`${API}/history`).then(r=>r.json());
    const user = history.find(u => u.username === username);
    if (!user || !user.points.length) {
      document.getElementById('chart').style.display='none';
      return;
    }

    // Calcul TAC à chaque point
    const R = user.gender === 'homme' ? 0.68 : 0.55;
    const ELIM = 0.15;
    const ABS = 0.5;
    const now = new Date();

    // Points de temps : chaque drink + maintenant
    const times = [...user.points.map(p => new Date(p.t)), now];
    const labels = times.map(t => t.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));

    const bacs = times.map(t => {
      let total = 0;
      for (const p of user.points) {
        const drink_t = new Date(p.t);
        if (drink_t > t) continue;
        const elapsed = (t - drink_t) / 3600000;
        const peak = p.alc_g / (user.weight_kg * R);
        const elim = ELIM * Math.max(0, elapsed - ABS);
        total += Math.max(0, peak - elim);
      }
      return Math.max(0, total);
    });

    if (chartInst) chartInst.destroy();
    const ctx = document.getElementById('chart').getContext('2d');
    document.getElementById('chart').style.display='block';
    chartInst = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'TAC (g/L)',
          data: bacs.map(b => b.toFixed(3)),
          borderColor: '#6366f1',
          backgroundColor: '#6366f122',
          fill: true,
          tension: 0.4,
          pointRadius: 4,
        }]
      },
      options: {
        plugins: {
          legend: { display: false },
          annotation: {}
        },
        scales: {
          y: {
            min: 0,
            grid: { color: '#e2e8f020' },
            ticks: { callback: v => v + ' g/L' }
          },
          x: { grid: { display: false } }
        }
      }
    });
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modal-bg') || e.type === 'click' && !e.target.closest('.modal')) {
      document.getElementById('modal-bg').classList.remove('open');
    }
  }

  // ── Render ──
  let lastData = [];

  function render(data) {
    lastData = data;
    const grid  = document.getElementById('grid');
    const empty = document.getElementById('empty');
    if (!data.length) { grid.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display = 'none';
    grid.innerHTML = data.map(renderCard).join('');
    renderDefi(data);
    updateMap(data);
  }

  // ── WebSocket ──
  let ws, retryDelay = 2000;

  function setStatus(ok, txt) {
    document.getElementById('dot').className = ok ? 'ok' : '';
    document.getElementById('status-text').textContent = txt;
  }

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onopen  = () => { setStatus(true,'Connecté — temps réel'); retryDelay=2000; };
    ws.onmessage = e => {
      render(JSON.parse(e.data));
      setStatus(true,'Mis à jour à ' + new Date().toLocaleTimeString('fr-FR'));
    };
    ws.onclose = () => {
      setStatus(false,`Reconnexion dans ${retryDelay/1000}s…`);
      setTimeout(connect, retryDelay);
      retryDelay = Math.min(retryDelay*2, 30000);
    };
    ws.onerror = () => ws.close();
  }

  connect();
</script>
</body>
</html>
